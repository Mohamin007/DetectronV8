{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>{% block title %}YOLOv8 Object Detection{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('theme');
        var theme = storedTheme === 'light' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (error) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a2e;
      --primary: #2563eb;
      --primary-light: #60a5fa;
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.72);
      --nav-height: 68px;
      --header-border: rgba(96, 165, 250, 0.45);
      --nav-link-bg: rgba(248, 250, 252, 0.02);
      --nav-link-active-bg: linear-gradient(90deg, rgba(37, 99, 235, 0.26), rgba(96, 165, 250, 0.16));
      --theme-toggle-bg: rgba(37, 99, 235, 0.14);
      --theme-toggle-border: rgba(96, 165, 250, 0.5);
    }

    html[data-theme="light"] {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --primary: #2563eb;
      --primary-light: #1d4ed8;
      --text: #111827;
      --muted: rgba(17, 24, 39, 0.72);
      --header-border: rgba(17, 24, 39, 0.12);
      --nav-link-bg: rgba(17, 24, 39, 0.04);
      --nav-link-active-bg: linear-gradient(90deg, rgba(37, 99, 235, 0.12), rgba(96, 165, 250, 0.08));
      --theme-toggle-bg: rgba(37, 99, 235, 0.08);
      --theme-toggle-border: rgba(37, 99, 235, 0.22);
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    html {
      background-color: var(--bg);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(rgba(37, 99, 235, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(96, 165, 250, 0.08) 2px, transparent 2px),
        linear-gradient(90deg, rgba(96, 165, 250, 0.08) 2px, transparent 2px),
        radial-gradient(circle at 15% -10%, rgba(37, 99, 235, 0.2), transparent 38%),
        radial-gradient(circle at 85% 5%, rgba(96, 165, 250, 0.15), transparent 40%),
        var(--bg);
      background-size: 40px 40px, 40px 40px, 120px 120px, 120px 120px, auto, auto, auto;
      color: var(--text);
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: pageFadeIn 0.4s ease forwards;
    }

    @keyframes pageFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    img,
    svg,
    video,
    canvas,
    table {
      max-width: 100%;
    }

    p,
    li,
    td,
    th,
    a,
    span,
    strong,
    em,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    code,
    label,
    button {
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      min-width: 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: color-mix(in srgb, var(--surface) 96%, transparent);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(37, 99, 235, 0.4);
      box-shadow: 0 1px 20px rgba(37, 99, 235, 0.15);
      transition: backdrop-filter 0.25s ease, background 0.25s ease;
    }

    .site-header.is-scrolled {
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(20px);
    }

    .nav-shell {
      width: min(1100px, 100%);
      margin: 0 auto;
      min-height: var(--nav-height);
      padding: 0.75rem 0.9rem;
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .brand {
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.3px;
      font-size: clamp(14px, 3.5vw, 20px);
      font-family: "Space Grotesk", "Inter", sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      flex: 0 1 auto;
      min-width: 0;
      white-space: nowrap;
    }

    .brand i {
      color: #2563eb;
      font-size: 0.95em;
      flex: 0 0 auto;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-left: auto;
      min-width: 0;
      flex: 0 1 auto;
    }

    .theme-toggle {
      border: 1px solid var(--theme-toggle-border);
      background: var(--theme-toggle-bg);
      color: var(--text);
      border-radius: 10px;
      width: 40px;
      height: 38px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      background: rgba(37, 99, 235, 0.2);
      border-color: var(--primary-light);
      transform: translateY(-1px);
      outline: none;
    }

    nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: nowrap;
      gap: 0.25rem;
      min-width: 0;
      margin-left: auto;
      flex: 1 1 auto;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      font-family: "Inter", sans-serif;
      font-size: clamp(0.58rem, 1.8vw, 0.95rem);
      padding: 0.4rem 0.45rem;
      border-radius: 10px;
      transition: color 0.2s ease, background 0.2s ease;
      background: var(--nav-link-bg);
      white-space: nowrap;
      flex: 0 1 auto;
    }

    nav a:hover,
    nav a:focus-visible {
      color: var(--text);
      background: rgba(37, 99, 235, 0.17);
      outline: none;
    }

    nav a.active {
      color: var(--text);
      background: var(--nav-link-active-bg);
      border-bottom: 2px solid #2563eb;
      text-shadow: 0 0 10px rgba(37, 99, 235, 0.8);
    }

    main.container {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 1.05rem;
      overflow-x: hidden;
      box-sizing: border-box;
      flex: 1;
    }

    @media (max-width: 768px) {
      .brand {
        max-width: 44vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      nav {
        gap: 0.18rem;
      }

      nav a {
        font-size: clamp(0.58rem, 2vw, 0.72rem);
        padding: 0.32rem 0.38rem;
        border-radius: 8px;
      }

      main.container {
        width: 100%;
        padding: 12px;
        margin: 12px 0;
        width: 100%;
      }
    }

    @media (min-width: 768px) {
      .nav-shell {
        padding: 1rem 1.4rem;
        gap: 1rem;
      }

      .theme-toggle {
        width: 42px;
        height: 40px;
      }

      nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.55rem;
        padding-top: 0;
      }

      nav a {
        padding: 0.58rem 0.8rem;
        background: transparent;
      }

      main.container {
        padding: 1.6rem;
      }
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: "Space Grotesk", "Inter", sans-serif;
      letter-spacing: 0.01em;
    }

    .cursor-spotlight {
      position: fixed;
      pointer-events: none;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: left 0.1s ease, top 0.1s ease;
      left: -999px;
      top: -999px;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body>
  <div class="cursor-spotlight" id="cursor-spotlight" aria-hidden="true"></div>
  <header class="site-header">
    <div class="nav-shell">
      <div class="brand"><i class="fa-solid fa-crosshairs" aria-hidden="true"></i><span>DetectronV8</span></div>
      <nav id="site-nav">
        <a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="{% url 'detection_page' %}" class="{% if request.path == '/detect/' %}active{% endif %}">Start
          Detection</a>
        <a href="{% url 'about' %}" class="{% if request.path == '/about/' %}active{% endif %}">About</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false"></button>
      </div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    (function () {
      var themeToggle = document.getElementById("theme-toggle");
      var root = document.documentElement;
      var siteHeader = document.querySelector('.site-header');
      var cursorSpotlight = document.getElementById('cursor-spotlight');

      if (!themeToggle || !root) {
        return;
      }

      var applyTheme = function (theme) {
        root.setAttribute("data-theme", theme);
        themeToggle.innerHTML = theme === "light" ? '<i class="fa-solid fa-sun" aria-hidden="true"></i>' : '<i class="fa-solid fa-moon" aria-hidden="true"></i>';
        themeToggle.setAttribute("aria-pressed", theme === "light" ? "true" : "false");
      };

      var storedTheme = null;

      try {
        storedTheme = localStorage.getItem("theme");
      } catch (error) {
        storedTheme = null;
      }

      applyTheme(storedTheme === "light" ? "light" : "dark");

      themeToggle.addEventListener("click", function () {
        var currentTheme = root.getAttribute("data-theme") === "light" ? "light" : "dark";
        var nextTheme = currentTheme === "light" ? "dark" : "light";

        applyTheme(nextTheme);

        try {
          localStorage.setItem("theme", nextTheme);
        } catch (error) {
          return;
        }
      });

      if (siteHeader) {
        var handleScroll = function () {
          if (window.scrollY > 20) {
            siteHeader.classList.add('is-scrolled');
          } else {
            siteHeader.classList.remove('is-scrolled');
          }
        };

        handleScroll();
        window.addEventListener('scroll', handleScroll, { passive: true });
      }

      if (cursorSpotlight) {
        window.addEventListener('mousemove', function (event) {
          cursorSpotlight.style.left = event.clientX + 'px';
          cursorSpotlight.style.top = event.clientY + 'px';
        });
      }
    })();
  </script>
</body>

</html>
